apiVersion: v1
kind: Service
metadata:
  name: vault-internal-rolling
  labels:
    app: vault-rolling
spec:
  clusterIP: None # Headless service
  ports:
    - name: http
      port: 8200
  selector:
    app: vault-rolling
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault-rolling
spec:
  serviceName: "vault-internal-rolling"
  replicas: 1
  # RollingUpdate is the default strategy for StatefulSets
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0 # Updates pods one-by-one from highest index down to 0
  selector:
    matchLabels:
      app: vault-rolling
  template:
    metadata:
      labels:
        app: vault-rolling
    spec:
      containers:
      - name: vault
        image: hashicorp/vault:1.20.0 # Example older version
        ports:
        - containerPort: 8200
          name: http
        - containerPort: 8201
          name: server
        env:
        - name: VAULT_ADDR
          value: "http://127.0.0.1:8200"
        resources:
          requests:
            memory: "32Mi"
            cpu: "250m"
          limits:
            memory: "32Mi"
            cpu: "250m"
        volumeMounts:
        - name: vault-data
          mountPath: /vault/data
  volumeClaimTemplates:
  - metadata:
      name: vault-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-gp3-sc" # Replace with your cluster's StorageClass
      resources:
        requests:
          storage: 4Gi

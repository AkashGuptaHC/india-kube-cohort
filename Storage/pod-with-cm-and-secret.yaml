apiVersion: v1
kind: Pod
metadata:
  name: my-app-pod-with-cm-and-secret
spec:
  containers:
  - name: my-app-container
    image: nginx:alpine # Replace with your actual application image
    env:
      # Inject a single environment variable from the ConfigMap
      - name: APP_LOG_LEVEL
        valueFrom:
          configMapKeyRef:
            name: app-config
            key: LOG_LEVEL
      # Inject a single environment variable from the Secret
      - name: APP_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: app-secret
            key: DB_PASSWORD
    # Alternative method: inject all key-value pairs from a ConfigMap/Secret as environment variables
    envFrom:
    - configMapRef:
        name: app-config
    - secretRef:
        name: app-secret
    volumeMounts:
    - name: config-volume
      mountPath: "/etc/config" # Files will be created here (e.g., /etc/config/LOG_LEVEL)
      readOnly: true
    - name: secret-volume
      mountPath: "/etc/secrets" # Files will be created here (e.g., /etc/secrets/DB_PASSWORD)
      readOnly: true
  volumes:
    - name: config-volume
      configMap:
        name: app-config
    - name: secret-volume
      secret:
        secretName: app-secret
  restartPolicy: OnFailure

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-pv-claim # Name of the PVC
spec:
  storageClassName: ebs-gp3-sc # Must match one of the pre-existing StorageClass name
  accessModes:
    - ReadWriteOnce # The volume can be mounted as read-write by a single node
  resources:
    requests:
      storage: 1Gi # Request 1 GiB of storage

apiVersion: v1
kind: Pod
metadata:
  name: mypod
spec:
  containers:
    - name: mycontainer
      image: nginx:latest
      volumeMounts:
        - mountPath: "/app/data" # The path inside the container where the volume will be mounted
          name: mypvc-volume
  volumes:
    - name: mypvc-volume
      persistentVolumeClaim:
        claimName: my-pv-claim # Must match the PVC name
